<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumaDLC — Вход / Регистрация</title>
<link rel="icon" href="/img/logo.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="brand">
    <img src="/img/logo.png" alt="Luma" class="brand-logo" style="object-fit:cover;">
    LumaDLC
  </div>
  <nav class="site-nav">
    <a href="/">Главная</a>
  </nav>
  <div class="header-actions" id="header-actions"></div>
</header>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-tabs">
      <div class="auth-tab" data-tab="login">🔑 Вход</div>
      <div class="auth-tab" data-tab="register">👤 Регистрация</div>
    </div>

    <div class="form-error" id="form-error"></div>
    <div class="form-success" id="form-success"></div>

    <!-- LOGIN -->
    <form id="login-form" class="auth-panel">
      <div class="field-group">
        <label class="field-label">Email</label>
        <div class="field-input-wrap">
          <span class="icon">✉</span>
          <input type="email" name="email" placeholder="Введите email" required>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Пароль</label>
        <div class="field-input-wrap">
          <span class="icon">🔒</span>
          <input type="password" name="password" placeholder="Введите пароль" required>
        </div>
      </div>
      <div class="row-between">
        <label class="checkbox-row">
          <input type="checkbox" name="remember"> Запомнить меня
        </label>
        <a href="#" class="muted">Забыли пароль?</a>
      </div>
      <div class="captcha-box">
        <div class="captcha-left">
          <div class="captcha-check"></div>
          Я не робот
        </div>
        <span class="muted">reCAPTCHA</span>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">🔑 Войти</button>
    </form>

    <!-- REGISTER -->
    <form id="register-form" class="auth-panel" style="display:none;">
      <div class="field-group">
        <label class="field-label">Имя пользователя</label>
        <div class="field-input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="username" placeholder="Введите имя пользователя" required>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <div class="field-input-wrap">
          <span class="icon">✉</span>
          <input type="email" name="email" placeholder="Введите email" required>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Пароль</label>
        <div class="field-input-wrap">
          <span class="icon">🔒</span>
          <input type="password" name="password" placeholder="Введите пароль" required>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Код приглашения</label>
        <div class="field-input-wrap">
          <span class="icon">🎟</span>
          <input type="text" name="invite_code" placeholder="Введите код приглашения" required>
        </div>
      </div>
      <div class="captcha-box">
        <div class="captcha-left">
          <div class="captcha-check"></div>
          Я не робот
        </div>
        <span class="muted">reCAPTCHA</span>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">👤 Создать аккаунт</button>
      <div class="terms-note">
        При создании аккаунта вы соглашаетесь с нашими <a href="#">Условиями использования</a>
      </div>
    </form>

  </div>
</div>

<script src="/js/common.js"></script>
<script>
  const tabs = document.querySelectorAll('.auth-tab');
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const errBox = document.getElementById('form-error');
  const okBox = document.getElementById('form-success');

  function showTab(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    loginForm.style.display = name === 'login' ? 'block' : 'none';
    registerForm.style.display = name === 'register' ? 'block' : 'none';
    errBox.classList.remove('show');
    okBox.classList.remove('show');
  }

  tabs.forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));

  const params = new URLSearchParams(location.search);
  showTab(params.get('tab') === 'register' ? 'register' : 'login');

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');
    okBox.classList.remove('show');
  }

  const errorMessages = {
    missing_fields: 'Заполните все поля',
    username_too_short: 'Имя пользователя слишком короткое',
    password_too_short: 'Пароль должен быть не менее 6 символов',
    invalid_invite_code: 'Неверный код приглашения',
    invite_code_used: 'Этот код приглашения уже использован',
    user_exists: 'Пользователь с таким именем или email уже существует',
    invalid_credentials: 'Неверный email или пароль'
  };

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(loginForm);
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') })
    });
    const data = await res.json();
    if (!res.ok) return showError(errorMessages[data.error] || 'Ошибка входа');
    location.href = '/dashboard.html';
  });

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(registerForm);
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: fd.get('username'),
        email: fd.get('email'),
        password: fd.get('password'),
        invite_code: fd.get('invite_code')
      })
    });
    const data = await res.json();
    if (!res.ok) return showError(errorMessages[data.error] || 'Ошибка регистрации');
    location.href = '/dashboard.html';
  });

  initHeader();
</script>
</body>
</html>
