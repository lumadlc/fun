<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumaDLC — Профиль</title>
<link rel="icon" href="/img/logo.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="brand">
    <img src="/img/logo.png" alt="Luma" class="brand-logo" style="object-fit:cover;">
    LumaDLC
  </div>
  <nav class="site-nav">
    <a href="/">Главная</a>
  </nav>
  <div class="header-actions" id="header-actions"></div>
</header>

<div class="dash-wrap">

  <div class="dash-tabs">
    <div class="dash-tab active" data-panel="account">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" /><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" /></svg>
      Аккаунт
    </div>
    <div class="dash-tab" data-panel="settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065" /><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" /></svg>
      Настройки
    </div>
    <div class="dash-tab" data-panel="launcher">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 13a8 8 0 0 1 7 7a6 6 0 0 0 3 -5a9 9 0 0 0 6 -8a3 3 0 0 0 -3 -3a9 9 0 0 0 -8 6a6 6 0 0 0 -5 3" /><path d="M7 14a6 6 0 0 0 -3 6a6 6 0 0 0 6 -3" /><path d="M14 9a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /></svg>
      Лаунчер
    </div>
  </div>

  <!-- ACCOUNT -->
  <div class="dash-panel active" id="panel-account">
    <div class="card" style="margin-bottom:16px;">
      <div class="profile-card">
        <div class="profile-left">
          <div class="avatar" id="avatar-initial">?</div>
          <div>
            <div class="profile-name">
              <span id="profile-username">—</span>
              <span class="profile-uid" id="profile-uid"></span>
            </div>
            <div class="profile-sub">Подписка до: <span id="profile-sub">None</span></div>
          </div>
        </div>
        <button class="icon-btn" id="logout-btn" title="Выйти">⏻</button>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-box">
        <div class="info-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10" /><path d="M3 7l9 6l9 -6" /></svg>
          Email
        </div>
        <div class="info-value" id="info-email">—</div>
      </div>
      <div class="info-box">
        <div class="info-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12" /><path d="M16 3l0 4" /><path d="M8 3l0 4" /><path d="M4 11l16 0" /><path d="M8 15h2v2h-2l0 -2" /></svg>
          Регистрация
        </div>
        <div class="info-value" id="info-created">—</div>
      </div>
      <div class="info-box">
        <div class="info-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M5 6a1 1 0 0 1 1 -1h12a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-12a1 1 0 0 1 -1 -1l0 -12" /><path d="M8 10v-2h2m6 6v2h-2m-4 0h-2v-2m8 -4v-2h-2" /><path d="M3 10h2" /><path d="M3 14h2" /><path d="M10 3v2" /><path d="M14 3v2" /><path d="M21 10h-2" /><path d="M21 14h-2" /><path d="M14 21v-2" /><path d="M10 21v-2" /></svg>
          HWID
        </div>
        <div class="info-value" id="info-hwid">Не привязан</div>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="dash-panel" id="panel-settings">
    <div class="card">

      <div class="settings-block">
        <div class="section-title">Сменить email</div>
        <div class="settings-row">
          <div class="field-input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6" /><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0" /><path d="M8 11v-4a4 4 0 1 1 8 0v4" /></svg>
            <input type="password" id="email-current-password" placeholder="Текущий пароль...">
          </div>
          <div class="field-input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10" /><path d="M3 7l9 6l9 -6" /></svg>
            <input type="email" id="email-new" placeholder="Новый email...">
          </div>
          <button class="btn" id="change-email-btn">✎ Изменить</button>
        </div>
      </div>

      <hr class="hr-soft">

      <div class="settings-block">
        <div class="section-title">Сменить пароль</div>
        <div class="settings-row">
          <div class="field-input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6" /><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0" /><path d="M8 11v-4a4 4 0 1 1 8 0v4" /></svg>
            <input type="password" id="password-current" placeholder="Текущий пароль...">
          </div>
          <div class="field-input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6" /><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0" /><path d="M8 11v-4a4 4 0 1 1 8 0v4" /></svg>
            <input type="password" id="password-new" placeholder="Новый пароль...">
          </div>
          <button class="btn" id="change-password-btn">✎ Изменить</button>
        </div>
      </div>

      <hr class="hr-soft">

      <div class="settings-block">
        <div class="section-title">Безопасность аккаунта (2FA)</div>
        <button class="tg-btn">✈ Настроить 2FA в Telegram</button>
      </div>

      <div class="form-error" id="settings-error" style="margin-top:16px;"></div>
      <div class="form-success" id="settings-success" style="margin-top:16px;"></div>
    </div>
  </div>

  <!-- LAUNCHER -->
  <div class="dash-panel" id="panel-launcher">
    <div class="card">
      <div class="launcher-info-row">
        <div class="info-box">
          <div class="info-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 4a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1v-12" /><path d="M3 13h18" /><path d="M8 21h8" /><path d="M10 17l-.5 4" /><path d="M14 17l.5 4" /></svg>
            Операционная система
          </div>
          <div class="info-value">Windows 10/11 (x64)</div>
        </div>
        <div class="info-box">
          <div class="info-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 7l16 0" /><path d="M4 17l16 0" /><path d="M7 4l0 16" /><path d="M17 4l0 16" /></svg>
            RAM
          </div>
          <div class="info-value">4 GB</div>
        </div>
        <div class="info-box">
          <div class="info-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M6.657 18c-2.572 0 -4.657 -2.007 -4.657 -4.483c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-11.878" /></svg>
            Видеокарта
          </div>
          <div class="info-value">Nvidia / Amd / Intel</div>
        </div>
      </div>
      <div class="download-row">
        <div class="muted">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline; margin-right:6px; vertical-align:text-bottom;"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M12 7v5l3 3" /></svg>
          Последнее обновление<br><strong style="color:var(--text)">18.01.2026</strong>
        </div>
        <button class="btn btn-primary" id="download-btn">⬇ Скачать</button>
      </div>
    </div>
  </div>

</div>

<footer class="site-footer">© LumaDLC</footer>

<script src="/js/common.js"></script>
<script>
  const tabs = document.querySelectorAll('.dash-tab');
  const panels = document.querySelectorAll('.dash-panel');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.toggle('active', x === t));
    panels.forEach(p => p.classList.toggle('active', p.id === 'panel-' + t.dataset.panel));
  }));

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('ru-RU');
  }

  (async () => {
    const me = await initHeader();
    if (!me) { location.href = '/auth.html?tab=login'; return; }

    document.getElementById('avatar-initial').textContent = me.username[0].toUpperCase();
    document.getElementById('profile-username').textContent = me.username;
    document.getElementById('profile-uid').textContent = '[' + me.uid + ']';
    document.getElementById('profile-sub').textContent = me.subscription_until
      ? fmtDate(me.subscription_until) : 'None';
    document.getElementById('info-email').textContent = me.email;
    document.getElementById('info-created').textContent = fmtDate(me.created_at);
    document.getElementById('info-hwid').textContent = me.hwid || 'Не привязан';

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/';
    });

    const settingsErr = document.getElementById('settings-error');
    const settingsOk = document.getElementById('settings-success');
    function flash(box, msg) {
      settingsErr.classList.remove('show');
      settingsOk.classList.remove('show');
      box.textContent = msg;
      box.classList.add('show');
    }

    const settingsErrors = {
      wrong_password: 'Текущий пароль указан неверно',
      email_taken: 'Этот email уже используется',
      password_too_short: 'Новый пароль должен быть не менее 6 символов'
    };

    document.getElementById('change-email-btn').addEventListener('click', async () => {
      const current_password = document.getElementById('email-current-password').value;
      const new_email = document.getElementById('email-new').value;
      const res = await fetch('/api/account/change-email', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_password, new_email })
      });
      const data = await res.json();
      if (!res.ok) return flash(settingsErr, settingsErrors[data.error] || 'Ошибка');
      document.getElementById('info-email').textContent = new_email;
      flash(settingsOk, 'Email успешно изменён');
    });

    document.getElementById('change-password-btn').addEventListener('click', async () => {
      const current_password = document.getElementById('password-current').value;
      const new_password = document.getElementById('password-new').value;
      const res = await fetch('/api/account/change-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_password, new_password })
      });
      const data = await res.json();
      if (!res.ok) return flash(settingsErr, settingsErrors[data.error] || 'Ошибка');
      flash(settingsOk, 'Пароль успешно изменён');
    });
  })();
</script>
</body>
</html>
